services:
  n8n:
    image: n8nio/n8n:latest
    container_name: shore-n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=n8n.shore-keeper.com
      - N8N_PORT=5678
      - N8N_PROTOCOL=https
      - WEBHOOK_URL=https://n8n.shore-keeper.com/
      - N8N_SECURE_COOKIE=true
    volumes:
      - n8n_data:/home/node/.n8n

volumes:
  n8n_data:

# Usage:
#   docker compose -f docker-compose.n8n.yml up -d
#
# After first run:
#   1. Open http://localhost:5678 and create an account
#   2. Go to Settings > API > Create API Key
#   3. Add to back-end/.env:
#      N8N_ENABLED=True
#      N8N_API_KEY=your_api_key_here
#
# Networking:
#   Public:  https://n8n.shore-keeper.com  (reverse proxy terminates TLS → container:5678)
#   Shore (back-end) → n8n: via N8N_BASE_URL in back-end/.env
#   n8n → Shore (webhooks): http://host.docker.internal:9000 (Docker Desktop)
