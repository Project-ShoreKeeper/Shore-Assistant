services:
  shore-ai:
    build: .
    image: shore-ai:latest
    container_name: shore-ai
    restart: unless-stopped
    runtime: nvidia
    environment:
      SHORE_AI_BIND: "0.0.0.0:9200"
      SHORE_AI_TOKEN: "${SHORE_AI_TOKEN}"
      SHORE_AI_STT_MODEL: "base"
      SHORE_AI_EMBED_MODEL: "all-MiniLM-L6-v2"
    ports:
      - "9200:9200"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
